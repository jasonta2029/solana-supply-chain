[toolchain]
anchor_version = "0.32.1"

[workspace]
types = "target/types"
members = [
    "programs/*"
]

[features]
seeds = false
skip-lint = false

[programs.localnet]
supply_chain = "ALNTvi8V7zPBUBVpXTNHLMQ5YehTe8FtVNKws9vMSGTG"

[programs.devnet]
supply_chain = "ALNTvi8V7zPBUBVpXTNHLMQ5YehTe8FtVNKws9vMSGTG"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
